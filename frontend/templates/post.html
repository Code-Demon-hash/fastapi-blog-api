<!--create post page-->
{% extends "index.html" %}

<div class="content-section">
    <form method="post">
        <fieldset class="form-group">
            <legend class="border-bottom mb-4">Create your first blog</legend>
            </fieldset>
            <div class="form-group">
                <button class="btn btn-outline-info" type="submit">Post</button>
            </div>
    </form>
</div>

<!--page heade-->
<article class="media content-section">
    <img class="rounded-circle article-img" src="https://www.gravatar.com/avatar/?d=mp&s=50" alt="Generic placeholder image">
    <div class="media-body">
        <div class="article-metadata">
            <a class="mr-2" href="#">{{ post.author }}</a>
            <small class="text-muted">{{ post.created_at|date:"F d, Y" }}</small>
        </div>
        <h2>{{ post.title }}</h2>
        <p class="article-content">{{ post.content }}</p>
    </div>
</article>

<!--Delete post-->
<div class="content-section">
    <form method="post">
        <fieldset class="form-group">
            <legend class="border-bottom mb-4">Delete your blog</legend>
            <h2>Are you sure you want to delete this post?</h2>
            </fieldset>
            <div class="form-group">
                <button class="btn btn-outline-danger" type="submit">Yes, Delete</button>
                <a class="btn btn-outline-secondary" href="blog-home">Cancel</a>
            </div>
    </form>
</div>

<!--Update post-->
<div class="container">
    <div class="row">
        <div class="col-lg-8 col-md-10 mx-auto">
            <div class="clearfix">
                <a class="btn btn-primary float-right" href="edit-post, post_id">Edit Post</a>
            </div>
        </div>
    </div>
</div>
