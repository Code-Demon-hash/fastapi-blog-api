{% extends "index.html" %}
{% block content %}
 <!-- User Profile -->
        <div id="profile-page" class="page-content authenticated" style="display:none;">
            <h2>My Profile</h2>
            <div id="profile-info" class="card"></div>
            <div class="mt-4">
                <h4>Change Password</h4>
                <form id="changePasswordForm">
                    <div class="mb-3">
                        <label for="currentPassword" class="form-label">Current Password</label>
                        <input type="password" id="currentPassword" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label for="newPassword" class="form-label">New Password</label>
                        <input type="password" id="newPassword" class="form-control" required minlength="8">
                    </div>
                    <button type="submit" class="btn btn-primary">Update Password</button>
                </form>
            </div>
        </div>
{% endblock content %}

<script type="module">
    import { CONFIG } from 'static/js/config.js';
    import { authManager } from '/static/js/auth.js';
    import { showModal, getErrorMessage, updateUIByRole } from '/static/js/utils.js';

    updateUIByRole();

    const profileInfo = document.getElementById('profile-info');
    const changePasswordForm = document.getElementById('changePasswordForm');

    async function loadProfile() {
        if (!authManager.isAuthenticated()) {
            window.location.href = '/login';
            return;
        }

        const user = authManager.getUser();
        const role = authManager.getRole();

        if (profileInfo) {
            profileInfo.innerHTML = `
                <div class="card-body">
                    <h5 class="card-title">User Details</h5>
                    <p class="card-text"><strong>Username:</strong> ${user.username}</p>
                    <p class="card-text"><strong>Email:</strong> ${user.email || 'N/A'}</p>
                    <p class="card-text"><strong>Account Role:</strong> 
                        <span class="badge bg-primary text-capitalize">${role}</span>
                    </p>
                </div>
            `;
        }
    }

    if (changePasswordForm) {
        changePasswordForm.addEventListener('submit', async (event) => {
            event.preventDefault();

            const currentPassword = document.getElementById('currentPassword').value;
            const newPassword = document.getElementById('newPassword').value;

            const submitBtn = changePasswordForm.querySelector('button[type="submit"]');
            submitBtn.disabled = true;

            try {
                const response = await fetch(`${CONFIG.API_BASE_URL}/users/me`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${authManager.getToken()}`
                    },
                    body: JSON.stringify({
                        current_password: currentPassword,
                        new_password: newPassword
                    })
                });

                if (response.ok) {
                    document.getElementById('modalTitle').textContent = "Success";
                    document.getElementById('modalBody').textContent = "Password updated successfully!";
                    document.getElementById('modalHeader').className = "modal-header text-white bg-success";
                    showModal('StatusModal');
                    changePasswordForm.reset();
                } else {
                    const errorData = await response.json();
                    document.getElementById('modalTitle').textContent = "Update Failed";
                    document.getElementById('modalBody').textContent = getErrorMessage(errorData);
                    document.getElementById('modalHeader').className = "modal-header text-white bg-danger";
                    showModal('StatusModal');
                }
            } catch (error) {
                document.getElementById('modalTitle').textContent = "";
                document.getElementById('modalBody').textContent = "Network error. Please try again.";
                document.getElementById('modalHeader').className = "modal-header text-white bg-danger border-0";
                showModal('StatusModal');
            } finally {
                submitBtn.disabled = false;
            }
        });
    }

    if (profileInfo) {
        loadProfile();
    }
</script>
{% endblock scripts %}
