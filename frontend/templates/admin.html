{% extends "index.html" %}
{% block content %}
<!-- Admin Panel -->
        <div id="admin-page" class="page-content admin-only" style="display:none;">
            <h2>Admin Panel</h2>
            <ul class="nav nav-tabs mb-3">
                <li class="nav-item">
                    <a class="nav-link active" href="#" onclick="showAdminSection('pending-blogs')">Pending Blogs</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#" onclick="showAdminSection('all-users')">Users</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="#" onclick="showAdminSection('analytics')">Analytics</a>
                </li>
            </ul>
            <div id="pending-blogs" class="admin-section"></div>
            <div id="all-users" class="admin-section" style="display:none;"></div>
            <div id="analytics" class="admin-section" style="display:none;"></div>
        </div>
{% endblock content %}

<script type="module">
    import { CONFIG } from 'static/js/config.js';
    import { authManager } from '/static/js/auth.js';
    import { showModal, getErrorMessage, updateUIByRole } from '/static/js/utils.js';

    updateUIByRole();

    const pendingBlogs = document.getElementById('pending-blogs');

    async function loadDashboard() {
        try {
            authManager.requireRole(CONFIG.ROLES.ADMIN);

        const respone = await fetch(`${CONFIG.API_BASE_URl}/blog/`, {
            headers: {
                'Authorization': `Bearer ${authManager.getToken()}`
            }
        });

        if (!response.ok) throw new Error('Failed to load blogs.');
        
        const allBlogs = await response.json();

        const pending = allBlogs.filter(blog => blog.status === CONFIG.BLOG_STATUS.PENDING);

        if (pending.length > 0) {
            pendingBlogs.innerHTML = pending.map(blog => `
            <div class="card mb-3 shadow-sm">
                        <div class="card-body">
                            <h5 class="card-title">${blog.title}</h5>
                            <p class="card-text text-muted">Author: ${blog.author?.username || 'Unknown'}</p>
                            <div class="mt-3">
                                <button class="btn btn-success btn-sm approve-btn" data-id="${blog.id}">
                                    Approve & Publish
                                </button>
                                <button class="btn btn-outline-danger btn-sm delete-btn" data-id="${blog.id}">
                                    Reject
                                </button>
                            </div>
                        </div>
                    </div>
                `).join('');
        } else {
            pendingBlogs.innerHTML = '<p class="text-center">No pending blogs.</p>';
        }
    } catch (error) {
        pendingBlogs.innerHTML = `<div class="alert alert-danger">${error.message}</div>`;
    }
}

    const approveBlog = async (blogId) => {
        try {
            const response = await fetch(`${CONFIG.API_BASE_URL}/blog/${blogId}/submit`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${authManager.getToken()}`
                },
                body: JSON.stringify({ status: CONFIG.BLOG_STATUS.PUBLISHED })
            });

            if (response.ok) {
                document.getElementById('modalTitle').textContent = "Success";
                document.getElementById('modalBody').textContent = "Blog has been published!";
                document.getElementById('modalHeader').className = "modal-header text-white bg-success";
                showModal('StatusModal');
                loadAdminDashboard(); // Refresh list
            } else {
                const errorData = await response.json();
                throw new Error(getErrorMessage(errorData));
            }
        } catch (error) {
            document.getElementById('modalTitle').textContent = "Error";
            document.getElementById('modalBody').textContent = error.message;
            document.getElementById('modalHeader').className = "modal-header text-white bg-danger";
            showModal('StatusModal');
        }
    };

    const attachAdminListeners = () => {
        document.querySelectorAll('.approve-btn').forEach(btn => {
            btn.addEventListener('click', () => approveBlog(btn.dataset.id));
        });
    };

    // Load dashboard on start
    if (pendingSection) {
        loadAdminDashboard();
    }

    // Handle Tab Switching (Global scope helper)
    window.showAdminSection = (sectionId) => {
        document.querySelectorAll('.admin-section').forEach(sec => sec.style.display = 'none');
        document.querySelectorAll('.nav-link').forEach(link => link.classList.remove('active'));
        
        document.getElementById(sectionId).style.display = 'block';
        event.currentTarget.classList.add('active');
    };

</script>
</script>
