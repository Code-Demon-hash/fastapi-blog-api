{% extends "index.html" %}
{% block content %}
<div class="container">
    <div class="all-comments-container d-flex gap-3 mb-4"></div>
    {% if current_user.isAuthenticated %}
        <img class="rounded-circle article-img flex-shrink-0"
            src="{{ current_user.image_path }}"
            alt="{{ current_user.username }}'s profile picture"
            width="64"
            height="64"
            loading="lazy">
        <div class="input-group">
            <input type="text" 
            class="form-control" 
            id="commentContent"
            placeholder="Add a comment..." 
            aria-describedby="submitCommentBtn">
            <button class="btn btn-primary" id="submitCommentBtn">Send</button>
        </div>
        {% endif %}
    </div>
     <div id="commentsList"></div> 
</div>
{% endblock content %}

{% block scripts %}
<script type="module">
    import { formDate } from '/static/js/utils.js';
    import  { authManager } from '/static/js/auth.js';
    import CONFIG from '/static/js/config.js';

    const commentInput = document.getElementById('commentContent');
    const commentsContainer = document.getElementById('commentsList');
    const submitCommentBtn = document.getElementById('submitCommentBtn');

    const blogId = "{{ blog.id }}"; 

    async function loadComments() {
        const user = await authManager.getUser();
        try {
            const response = await fetch(`/comment/${blogId}`);

            if (!response.ok) {
                throw new Error('Failed to fetch');
        }
        const  data = await response.json();

        commentsContainer.innerHTML = data.map(comment => renderComment(comment, user)).join('');
    } catch(error) {
        console.error('Error:', error);
        commentsContainer.innerHTML = '<p class="text-danger">Could not load comments.</p>';
    }
}

    async function handleCommentSubmit() {
        const content = commentInput.value.trim();

        submitCommentBtn.disabled = true;
        submitCommentBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Adding...';

        const token = await authManager.getToken();
        try {
            const response = await fetch(`/comment/create/${blogId}`, { 
                method: 'POST', 
                headers: {
                    'Authorization': `Bearer ${token}`, 
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ 
                    content: content
                })
            });

            if (!response.ok) {
                throw new Error('Failed to add comment.');
                const data = await response.json();
            } else {
                loadComments();
            }
         } catch(error) {
            console.error('Network error. Please check your connection and try again later.:', error);
         } finally {
            submitCommentBtn.disabled = false;
            submitCommentBtn.innerHTML = 'Send';
         }
    }

    function renderComment(comment, currentUser) { 
        const isOwner = currentUser && currentUser.id === comment.user_id;
        const isAdmin = currentUser && currentUser.role === CONFIG.ROLE.ADMIN;
        const actions = (isOwner || isAdmin) ? `
            <div class="comment-actions mt-2">
                <button class="btn btn-sm btn-primary edit-comment-btn" data-comment-id="${comment.id}">
                    <i class="bi bi-pencil"></i> Edit
                </button>
                <button class="btn btn-sm btn-danger delete-comment-btn" data-comment-id="${comment.id}">
                    <i class="bi bi-trash"></i> Delete
                </button>
            </div>` : '';
        
        return `
            <div class="comment-wrapper" data-comment-id="${comment.id}">
                <div class="comment-header d-flex justify-content-between align-items-start mb-2">
                    <div>
                        <strong class="comment-author">${comment.user.username}</strong>
                        <small class="text-muted ms-2">${formDate(comment.created_at)}</small>
                    </div>
                </div>
                <p class="comment-content mb-2">${comment.content}</p>
                ${actions}
            </div>`;
    }

    if (submitCommentBtn) {
         submitCommentBtn.addEventListener('click', handleCommentSubmit);
         commentInput.addEventListener('keypress', (event) => {
             if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                handleCommentSubmit();
             }
    });
    }
    loadComments();
</script>
{% endblock scripts %}
