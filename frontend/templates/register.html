{% extends "index.html" %}
{% block content %}

<div class="content-section py-3 px-4 mb-4">
    <h2 class="mb-4">Create Account</h2>
    <form id="registerForm">
        <div class="mb-3">
            <label for="username" class="form-label">Username</label>
            <input type="text"
                class="form-control"
                id="username"
                name="username"
                required
                minlength="1"
                maxlength="50">
        </div>
        <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input type="email"
                class="form-control"
                id="email"
                name="email"
                required>
        </div>
        <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input type="password"
                class="form-control"
                id="password"
                name="password"
                required
                minlength="8">
                <div class="form-text">Password must be at least 8 characters long.</div>
                <button class="btn btn-outline-secondary toggle-password" type="button" data-target="password">
                    <i class="far fa-eye-slash"></i>
                </button>
        </div>
        <div class="mb-3">
            <label for="accountType" class="form-label">Account Type</label>
            <select id="accountType" class="form-control" required>
                 <option value="user">User (Reader)</option>
                  <option value="author">Author (Writer)</option>
            </select>
        <div class="mb-3">
            <label for="confirmPassword" class="form-label">Confirm Password</label>
            <input type="password"
                class="form-control"
                id="confirmPassword"
                name="confirmPassword"
                required
                minlength="8">
                <button class="btn btn-outline-secondary toggle-password" type="button" data-target="confirmPassword">
                    <i class="far fa-eye-slash"></i>
                </button>
        </div>
        <button type="submit" class="btn btn-primary">Create Account</button>
    </form>
    <p class="mt-3">
        Already have an account? <a href="{{ url_for('login') }}">Login here</a>
    </p>
</div>  

<div class="modal fade" id="StatusModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div id="modalHeader" class="modal-header text-white">
        <h5 class="modal-title" id="modalTitle">Status</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body text-center" id="modalBody"></div>
    </div>
  </div>
</div>
{% endblock content %}  

{ % block scripts % }
<script type="module">
   import { getErrorMessage, showModal, updateUIByRole } from '/static/js/utils.js';
   import { authManager } from '/static/js/auth.js';
   import { CONFIG } from '/static/js/config.js';

   const registerForm = document.getElementById('registerForm');

   document.querySelectorAll('.toggle-password').forEach(button => {
    button.addEventListener('click', () => {
        const targetId = button.getAttribute('data-target');
        const input = document.getElementById(targetId);
        const isPassword = input.type === 'password';

        input.type = isPassword ? 'text' : 'password';
        const icon = button.querySelector('i');
        icon.classList.toggle('fa-eye');
        icon.classList.toggle('fa-eye-slash');
    });
   });
   
   registerForm.addEventListener('submit', async (event) => {
    event.preventDefault();

    const formData = new FormData(registerForm);
    const password = formData.get('password');
    const confirmPassword = formData.get('confirmPassword');
    const role = document.getElementById('accountType').value;

    if (password !== confirmPassword) {
        document.getElementById('modalBody').textContent = 'Passwords do not match!';
        document.getElementById('modalHeader').className('modal-header text-white');
        showModal('StatusModal');
        return;
    }

    try {
        const endpoint = role === 'author' ? '/author/signup' : '/user/create_account';

        const respone = await fetch(`${CONFIG.API_BASE_URL}${endpoint}`, {
            method: 'POST',
            body: formData
        });

        if (respone.ok) {
            document.getElementById('modalTitle').textContent =
            'Account created successfully! Please login.';
            showModal('StatusModal');

            window.location.href = '/login';
        } else {
            const errorData = await response.json();
            document.getElementById('modalBody').textContent = getErrorMessage(errorData);
            document.getElementById('modalHeader').className = "modal-header bg-danger text-white";
            showModal('StatusModal');
        }
    } catch (error) {
        document.getElementById('modalBody').textContent =
        'Network error. Please check your connection and try again.';
        showModal('StatusModal');
    }
});
 </script>
{% endblock scripts %}
