{% extends "index.html" %}
{% block content %}

// like button for post and comment
<div class="like-container">
    <button id="likeBtn" class="btn btn-outline-primary">
        <span id="likeIcon" class="bi bi-heart"></span>
        <span id="likeCount">{{ like_count }}</span>
    </button>
</div>
{% endblock content %}

{% block scripts %}
<script type="module">
    import { getErrorMessage, showModal } from '/static/js/utils.js';
    import  { authManager } from '/static/js/auth.js';
    import CONFIG from '/static/js/config.js';

    const likeBtn = document.getElementById('likeBtn');
    const likeCount = document.getElementById('likeCount');
    const likeIcon = document.getElementById('likeIcon');

    const blogId = "{{ blog.id }}";

    let isLiked = false;

    // load post like status
    async function loadLikeStatus() {
        if (authManager.isGuest()) { 
            return;
        }
        try {
            const response = await fetch(`/like/${blogId}`, { 
                method: 'GET',
                headers: {
                    'Content-Type': 'application/json'
                }
            });

            if (response.ok) {
                const data = await response.json();
                isLiked = data.is_liked;
                updateLikeButton(isLiked, data.like_count);
            }
        } catch (error) {
            console.error('Failed to load like status', error);
        }
    }

    function updateLikeUI(liked) {
        isLiked = liked;    
        if (isLiked) {
            likeBtn.classList.remove('btn-outline-primary');
            likeBtn.classList.add('btn-primary');
            likeIcon.classList.remove('bi-heart');
            likeIcon.classList.add('bi-heart-fill');
        } else {
            likeBtn.classList.remove('btn-primary');
            likeBtn.classList.add('btn-outline-primary');
            likeIcon.classList.remove('bi-heart-fill');
            likeIcon.classList.add('bi-heart');
        }
    }

    likeBtn.addEventListener('click', async () => {
        if (authManager.isGuest()) {
            window.location.href = '/login';
            return;
        }

        // disable button during request to prevent multiple clicks
        likeBtn.disabled = true;
        const token = authManager.getToken();
        
        try {
            // use delete method to unlike and post method to like
            const method = isLiked ? 'DELETE' : 'POST';
            const response = await fetch(`/like/${blogId}`, { 
                method: method,
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'                }
            });

            if (response.status === 401) { window.location.href = '/login'; return; }

            if (response.ok) {
                const data = await response.json();
                updateLikeUI(data.is_liked, data.like_count);
            } else {
                const error = await response.json();
                console.error('Action failed.:', error);
            }
        } catch (error) {
            console.error('Network error. Please check you connection and try again later.');
        } finally {
            likeBtn.disabled = false;
        }
    });
    loadLikeStatus();
</script>
{% endblock scripts %}
