{% extends "index.html" %}
{% block content %}
<div class="content-section py-3 px-4 mb-4">
    <h2 class="mb-4">Login</h2>
    <form id="loginForm">
        <div class="mb-3">
            <label for="username" class="form-label">Username</label>
            <input type="text" class="form-control" id="username" name="username" required>
        </div>
        <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <div class="input-group">     
            <input type="password"
                   class="form-control"
                   id="password"
                   name="password"
                   required>
                   <button class="btn btn-outline-secondary toggle-password" type="button">
                    <i class="far fa-eye-slash"></i>
                </button>
            </div>
        </div>
        <button type="submit" class="btn btn-primary">Login</button>
    </form>
    <p class="mt-3">
        Don't have an account? <a href="{{ url_for('register') }}">Register here</a>
    </p>
</div>

<div class="modal fade" id="LoginErrorModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header bg-danger text-white">
        <h5 class="modal-title">Login Error</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body text-center">
        <p class="mt-3" id="loginErrorText"></p> 
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
      </div>
    </div>
  </div>
</div>
{% endblock content %}

{% block scripts %}
<script type="module">
import { getErrorMessage, showModal, updateUIByRole } from '/static/js/utils.js';
import { authManager } from '/static/js/auth.js';
import { CONFIG } from '/static/js/config.js';

const loginForm = document.getElementById('loginForm');
const passwordInput = document.getElementById('password');
const togglePasswordButton = document.querySelector('.toggle-password');

const user = {
    validateCredentials: function (username, password) {
        return (
            ((username = (username || '').toString()) || true) &&
            ((password = (password || '').toString()) || true) &&
            (
                (!username) ? {error: 'No Username Given.', field: 'name'}
                :(!password) ? {error: 'No Password Given.', field: 'pass'}
                :(username.length < 3) ? { error: "Username is less than 3 Characters.", field: 'name' }
                :(password.length < 8) ? {error: 'Password should be at least 8 characters.', field: 'pass'}
                : (!/^([a-z0-9-_]+)$/i.test(username))   ? { error: "Username contains invalid characters.", field: 'name' }
                : false
            )
        );
    }
};

togglePasswordButton.addEventListener('click', () => {
    const isPassword = passwordInput.type === 'password';
    passwordInput.type = isPassword ? 'text': 'password';

    const icon = togglePasswordButton.querySelector('i');
    icon.classList.toggle('fa-eye');
    icon.classList.toggle('fa-eye-slash');

});

loginForm.addEventListener('submit', async (event) => {
    event.preventDefault();

    const formData = new FormData(loginForm);
    const username = formData.get('username');
    const password = formData.get('password');

    const validation = user.validateCredentials(username, password);

    if (validation) {
        document.getElementById('loginErrorText').textContent = validation.error;
        showModal('LoginErrorModal');
        return;
    }

    const loginEndpoints = [
        { url: '/user/token', role: CONFIG.ROLES.USER },
        { url: '/author/login', role: CONFIG.ROLES.AUTHOR },
        { url: '/admin/login', role: CONFIG.ROLES.ADMIN }
    ];

    let loginSuccessful = false;

    for (const attempt of loginEndpoints) {
        try {
            const response = await fetch(`${CONFIG.API_BASE_URL}${attempt.url}`, { 
                method: 'POST',
                body: formData
        });

        if (response.ok) {
            const data = await response.json();
            authManager.setToken(data.access_token);
            authManager.setUser(data.user);
            authManager.setRole(attempt.role);

            loginSuccessful = true;

            updateUIByRole();
            window.location.href = '/home'

            break;
        }
    }catch(error) {
        console.warn(`Attempt failed for ${attempt.role}`);
    }
    }
     if (!loginSuccessful) {
        document.getElementById('loginErrorText').textContent =
        'Invalid credentials. Please try again.';
        showModal('LoginErrorModal');
    }
});
</script>
{% endblock scripts %}
